// ─── HotSpot (shared) ────────────────────────────────────────────────
function HotSpot({ x, y, side, product, isHovered, onHover, onLeave, onSelect }) {
  const peekDirection = side === 'right' ? 'left-full ml-3' : 'right-full mr-3';
  return (
    <div
      className="absolute -translate-x-1/2 -translate-y-1/2"
      style={{ left: `${x}%`, top: `${y}%` }}
      onMouseEnter={onHover}
      onMouseLeave={onLeave}
    >
      <button
        onClick={onSelect}
        aria-label={`Open product: ${product.name}, ${product.price}`}
        className="relative grid place-items-center transition-all duration-300 ease-out"
        style={{
          width: isHovered ? 28 : 20,
          height: isHovered ? 28 : 20,
          background: 'transparent',
          border: 'none',
          cursor: 'pointer',
          padding: 0,
        }}
      >
        <span
          className="absolute inset-0 rounded-full transition-all duration-300 ease-out"
          style={{
            border: `1.5px solid rgba(245,244,240,0.7)`,
            background: isHovered ? 'rgba(245,244,240,0.24)' : 'rgba(245,244,240,0.14)',
            backdropFilter: 'blur(2px)',
            boxShadow: isHovered
              ? '0 0 12px rgba(245,244,240,0.18)'
              : '0 0 6px rgba(245,244,240,0.1)',
          }}
        />
        <span
          className="relative rounded-full"
          style={{
            width: 5,
            height: 5,
            background: theme.cream,
            boxShadow: '0 0 12px rgba(245,244,240,0.7)',
          }}
        />
        <span
          className="absolute rounded-full pointer-events-none"
          style={{
            inset: -7,
            border: '1px solid rgba(245,244,240,0.32)',
            opacity: isHovered ? 1 : 0,
            transform: isHovered ? 'scale(1.1)' : 'scale(0.85)',
            transition: 'all 400ms ease-out',
          }}
        />
      </button>
      <div
        className={`absolute top-1/2 -translate-y-1/2 ${peekDirection} pointer-events-none`}
        style={{
          opacity: isHovered ? 1 : 0,
          transform: `translateY(-50%) translateX(${
            isHovered ? 0 : side === 'right' ? -6 : 6
          }px)`,
          transition: 'all 300ms ease-out',
          whiteSpace: 'nowrap',
        }}
      >
        <div
          className="px-3 py-2"
          style={{
            background: 'rgba(20,18,16,0.78)',
            backdropFilter: 'blur(8px)',
            border: `1px solid ${theme.creamHairline}`,
            color: theme.cream,
            fontFamily: fontStack.mono,
            fontSize: 10,
            letterSpacing: '0.08em',
            textTransform: 'uppercase',

          <span className="mx-2" style={{ opacity: 0.4 }}>·</span>
          <span>{product.price}</span>
        </div>
      </div>
    </div>
  );
}

// ─── Plate (shared) ──────────────────────────────────────────────────
function Plate({ plate, grid, aspect, hoveredHotspot, setHoveredHotspot, onSelectProduct }) {
  return (
    <article className={`${grid} group flex flex-col gap-4`}>
      <div
        className="relative w-full overflow-hidden"
        style={{ background: plate.gradient, aspectRatio: aspect }}
      >
        <div
          className="absolute inset-0 mix-blend-overlay pointer-events-none"
          style={{ backgroundImage: grainSvg, opacity: 0.45 }}
        />
        <div
          className="absolute inset-x-0 bottom-0 pointer-events-none"
          style={{
            height: '40%',
            background:
              'linear-gradient(to bottom, transparent 0%, rgba(20,18,16,0.32) 100%)',
          }}
        />
        <div
          className="absolute bottom-3 right-3 flex items-center gap-2 pointer-events-none"
          style={{
            color: theme.creamMute,
            fontFamily: fontStack.mono,
            fontSize: 10,
            letterSpacing: '0.1em',
            textTransform: 'uppercase',
          }}
        >
          <span style={{ width: 18, height: 1, background: theme.creamHairline }} />
          <span>{plate.no}</span>
        </div>
        {plate.hotspots.map((h) => (
          <HotSpot
            key={h.id}
            {...h}
            isHovered={hoveredHotspot === h.id}
            onHover={() => setHoveredHotspot(h.id)}
            onLeave={() => setHoveredHotspot(null)}
            onSelect={() => onSelectProduct(h.product)}
          />
        ))}
        {plate.atmosphericOnly && (
          <div
            className="absolute bottom-3 left-3"
            style={{
              color: theme.creamFaint,
              fontFamily: fontStack.mono,
              fontSize: 9,
              letterSpacing: '0.14em',
              textTransform: 'uppercase',
            }}
          >
            Atmosphere
          </div>
        )}
      </div>
      <div className="pl-4" style={{ borderLeft: `1px solid ${theme.hairline}` }}>
        <p
          style={{
            fontFamily: fontStack.body,
            fontSize: 13,
            lineHeight: 1.55,
            color: theme.inkMute,
            letterSpacing: '-0.005em',
          }}
        >
          {plate.caption}
        </p>
      </div>
    </article>
  );
}

    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  if (!product) return null;

  return (
    <div className="fixed inset-0 z-50 flex">
      <button
        aria-label="Close drawer"
        onClick={onClose}
        className="flex-1"
        style={{
          background: 'rgba(20,18,16,0.32)',

              cursor: 'pointer',

    <section
      style={{
        background: theme.sectionBg,
        fontFamily: fontStack.body,
        minHeight: '100vh',
      }}
    >
      <div
        className="mx-auto"
        style={{
          maxWidth: 1440,
          padding: 'clamp(48px, 6vw, 96px) clamp(20px, 4vw, 64px)',
        }}
      >
        {/* Masthead — shared across all rhythms */}
        <header
          className="grid grid-cols-3 items-center gap-4"
          style={{ paddingBottom: 16, borderBottom: `0.5px solid ${theme.hairline}` }}
        >
          <span
            style={{
              fontFamily: fontStack.mono,
              fontSize: 11,
              color: theme.ink,
              letterSpacing: '0.14em',
              textTransform: 'uppercase',
            }}
          >
            {masthead.edition}
          </span>
          <span
            className="text-center"
            style={{
              fontFamily: fontStack.display,
              fontStyle: 'italic',
              fontWeight: 400,
              fontSize: 'clamp(14px, 1.4vw, 18px)',
              color: theme.ink,
              letterSpacing: '-0.005em',
            }}
          >
            {masthead.issue}
          </span>
          <span
            className="text-right"
            style={{
              fontFamily: fontStack.mono,
              fontSize: 11,
              color: theme.ink,
              letterSpacing: '0.14em',
              textTransform: 'uppercase',
            }}
          >
            {masthead.season}
          </span>
        </header>

        {/* Plate grid — Editorial asymmetric 12-col */}
        <div
          className="grid grid-cols-1 lg:grid-cols-12 gap-x-6 gap-y-12 lg:gap-y-16"
          style={{ marginTop: 'clamp(32px, 4vw, 56px)' }}
        >
          <IntroPlate />
          {plates.map((plate) => {
            const layout = editorialLayout[plate.id];
            return (
              <Plate
                key={plate.id}
                plate={plate}
                grid={layout.grid}
                aspect={layout.aspect}
                hoveredHotspot={hoveredHotspot}
                setHoveredHotspot={setHoveredHotspot}
                onSelectProduct={setActiveProduct}
              />
            );
          })}
        </div>

        {/* Closing CTA band — single anchor for the edition (Option C) */}
        <div
          className="flex justify-center items-center"
          style={{
            marginTop: 'clamp(64px, 8vw, 120px)',
            paddingTop: 'clamp(40px, 5vw, 64px)',
            paddingBottom: 'clamp(40px, 5vw, 64px)',
            borderTop: `0.5px solid ${theme.hairline}`,
            borderBottom: `0.5px solid ${theme.hairline}`,
          }}
        >
          <a
            href="#"
            className="group inline-flex items-baseline gap-4"
            style={{
              fontFamily: fontStack.display,
              fontStyle: 'italic',
              fontWeight: 400,
              fontSize: 'clamp(28px, 3.5vw, 44px)',
              letterSpacing: '-0.01em',
              color: theme.ink,
              paddingBottom: 8,
              borderBottom: `1px solid ${theme.ink}`,
            }}
          >
            <span>{closing.cta}</span>
            <span
              className="transition-transform duration-200 ease-out group-hover:translate-x-2"
              style={{
                fontFamily: fontStack.body,
                fontStyle: 'normal',
                fontSize: 28,
                display: 'inline-block',
              }}
            >
              →
            </span>
          </a>
        </div>

        {/* Meta strip — secondary metadata, single hairline-anchored row */}
        <footer
          className="grid grid-cols-2 items-center gap-4"
          style={{
            marginTop: 'clamp(40px, 5vw, 56px)',
            paddingTop: 0,
            borderTop: 'none',
          }}
        >
          <span
            style={{
              fontFamily: fontStack.mono,
              fontSize: 10,
              color: theme.inkFaint,
              letterSpacing: '0.14em',
              textTransform: 'uppercase',
            }}
          >
            {meta.left}
          </span>
          <a
            href="#"
            className="group justify-self-end inline-flex items-center gap-2"
            style={{
              fontFamily: fontStack.mono,
              fontSize: 10,
              color: theme.ink,
              letterSpacing: '0.14em',
              textTransform: 'uppercase',
              paddingBottom: 3,
              borderBottom: `0.5px solid ${theme.ink}`,
            }}
          >
            <span>{meta.right}</span>
            <span
              className="transition-transform duration-200 ease-out group-hover:translate-x-1"
              style={{ display: 'inline-block' }}
            >
              →
            </span>
          </a>
        </footer>
      </div>

      <Drawer product={activeProduct} onClose={() => setActiveProduct(null)} />
    </section>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<LookBook />);
  </script>
</body>
</html>
